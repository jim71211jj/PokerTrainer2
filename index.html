<!DOCTYPE html>
<html>
<head>
    <title>我的撲克訓練器</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f6f9; }
        .top-container { display: flex; gap: 30px; margin-bottom: 30px; align-items: flex-start; }
        .game-section {
            background-color: #e9ecef; border-radius: 12px; padding: 30px 40px; border: 2px solid #ccc;
            display: flex; flex-direction: column; align-items: center; box-shadow: 0 8px 16px rgba(0,0,0,0.1); min-width: 380px;
        }
        .stats-section { display: flex; flex-direction: column; gap: 20px; min-width: 280px; }
        .scoreboard { background-color: #fff; padding: 25px; border-radius: 12px; border: 2px solid #0056b3; text-align: center; }
        
        .settings-box {
            background-color: #fff; padding: 15px; border-radius: 12px; border: 1px solid #ccc;
            font-size: 14px; box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .settings-title { font-weight: bold; margin-bottom: 10px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .checkbox-item { display: flex; align-items: center; gap: 4px; background: #f1f3f5; padding: 3px 6px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        
        .poker-table {
            position: relative; width: 280px; height: 140px; background-color: #2b8a3e; border: 14px solid #5c3a21; 
            border-radius: 140px / 70px; margin-top: 10px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 10px 15px rgba(0,0,0,0.3);
        }
        .seat {
            position: absolute; width: 42px; height: 42px; background-color: #444; color: #ccc; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; border: 2px solid #777;
            transform: translate(-50%, -50%); transition: all 0.3s ease;
        }
        
        /* 籌碼樣式修正回歸 */
        .chip {
            position: absolute; background-color: #e0e0e0; border: 2px dashed #999; border-radius: 12px;
            padding: 2px 6px; font-size: 10px; font-weight: bold; color: #333; transform: translate(-50%, -50%); z-index: 4;
        }
        #chip-bb { top: 26%; left: 50%; } 
        #chip-sb { top: 35%; left: 16%; }

        #seat-BB { top: 0%; left: 50%; }
        #seat-UTG { top: 20%; left: 95%; }
        #seat-HJ { top: 80%; left: 95%; }
        #seat-CO { top: 100%; left: 50%; }
        #seat-BTN { top: 80%; left: 5%; }
        #seat-SB { top: 20%; left: 5%; }
        
        .seat.hero { background-color: #ff4d4d; color: white; border-color: #ffeb3b; transform: translate(-50%, -50%) scale(1.2); z-index: 10; }
        .seat.villain { background-color: #f59f00; color: white; border-color: #fff; z-index: 5; }
        
        .hand-display-large { font-size: 64px; font-weight: bold; color: #212529; letter-spacing: 4px; margin: 25px 0; }
        .action-buttons { display: flex; justify-content: center; gap: 15px; width: 100%; }
        .action-btn { font-size: 22px; padding: 12px 0; width: 110px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .open-btn { background-color: #ff4d4d; color: white; border: none; }
        .call-btn { background-color: #51cf66; color: #111; border: none; }
        .fold-btn { background-color: #4a6fa5; color: white; border: none; }
        
        #feedback-msg { font-size: 28px; font-weight: bold; margin-top: 20px; height: 35px; }
        .divider { border-top: 2px dashed #bbb; margin: 30px 0; width: max-content; min-width: 540px; }
        
        .range-btn { padding: 6px 12px; font-size: 13px; cursor: pointer; margin-right: 4px; border: 1px solid #ccc; background-color: #f8f9fa; border-radius: 4px; margin-bottom: 4px; }
        .range-btn.active { background-color: #0056b3; color: white; border-color: #004494; font-weight: bold; }

        .grid-container { display: grid; grid-template-columns: repeat(13, 38px); gap: 2px; background-color: #333; padding: 8px; border-radius: 8px; width: max-content; }
        .cell { width: 38px; height: 38px; background-color: #4a6fa5; display: flex; align-items: center; justify-content: center; font-size: 11px; color: rgba(255,255,255,0.6); }
        .raise { background-color: #ff4d4d; color: white; font-weight: bold; } 
        .call { background-color: #51cf66; color: #111; font-weight: bold; } 
        
        .range-stats { margin-top: 15px; font-size: 15px; font-weight: bold; background-color: #fff; padding: 10px 20px; border-radius: 8px; border: 1px solid #ccc; width: max-content; display: flex; gap: 20px; }
        .stat-raise { color: #e60000; } .stat-call { color: #2b8a3e; } .stat-fold { color: #3b5984; }
        .controls-row { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>我的 Poker Preflop 訓練器 (籌碼回歸修正版)</h2>
    <div class="top-container">
        <div class="game-section">
            <h3 id="table-title">UTG</h3>
            <div class="poker-table">
                <div class="chip" id="chip-sb">0.5 BB</div>
                <div class="chip" id="chip-bb">1 BB</div>
                <div class="seat" id="seat-SB">SB</div><div class="seat" id="seat-BB">BB</div>
                <div class="seat" id="seat-UTG">UTG</div><div class="seat" id="seat-HJ">HJ</div>
                <div class="seat" id="seat-CO">CO</div><div class="seat" id="seat-BTN">BTN</div>
            </div>
            <div id="table-hand-display" class="hand-display-large">? ?</div>
            <div class="action-buttons">
                <button class="action-btn open-btn" onclick="checkAnswer('Raise')">Raise</button>
                <button class="action-btn call-btn" onclick="checkAnswer('Call')">Call</button>
                <button class="action-btn fold-btn" onclick="checkAnswer('Fold')">Fold</button>
            </div>
            <p id="feedback-msg"></p>
        </div>

        <div class="stats-section">
            <div class="scoreboard">
                <div>🎯 答對題數: <span id="score-display">0</span> / <span id="total-display">0</span></div>
                <div style="font-size: 42px; color: #2b8a3e;"><span id="accuracy-display">0</span>%</div>
                <button class="range-btn" onclick="resetScore()" style="width: 100%;">重新計算</button>
            </div>

            <div class="settings-box">
                <div class="settings-title">⚙️ 練習範圍設定</div>
                <div style="font-size: 11px; color: #666;">我的開池 (RFI)：</div>
                <div class="checkbox-group" id="check-group-rfi"></div>
                <div style="font-size: 11px; color: #666;">大盲防守 (BB)：</div>
                <div class="checkbox-group" id="check-group-bb"></div>
                <div style="display: flex; gap: 5px; margin-top: 10px;">
                    <button onclick="toggleAllChecks(true)" style="flex:1; font-size:10px;">全選</button>
                    <button onclick="toggleAllChecks(false)" style="flex:1; font-size:10px;">全不選</button>
                </div>
            </div>
        </div>
    </div>

    <div class="divider"></div>
    <h3 id="ref-title">範圍參考表</h3>
    <div class="controls" id="range-controls"></div>
    <div id="poker-grid" class="grid-container"></div>
    <div class="range-stats">
        <div>Raise: <span id="stat-raise" class="stat-raise">0%</span></div>
        <div>Call: <span id="stat-call" class="stat-call">0%</span></div>
        <div>Fold: <span id="stat-fold" class="stat-fold">0%</span></div>
    </div>

    <script>
        const ranks = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];
        const rfiPos = ['UTG', 'HJ', 'CO', 'BTN', 'SB'];
        const bbPos = ['BB_UTG', 'BB_HJ', 'BB_CO', 'BB_BTN', 'BB_SB'];

        function parseThreshold(sStr, oStr, pStr) {
            let hands = [];
            if (!sStr) sStr = ""; if (!oStr) oStr = "";
            const s = sStr.replace(/\s/g, '');
            const o = oStr.replace(/\s/g, '');
            const p = pStr ? pStr.replace(/\s/g, '') : "";
            for (let i = 0; i < s.length; i++) {
                let high = ranks[i], thresholdIdx = ranks.indexOf(s[i]);
                for (let j = i + 1; j <= thresholdIdx; j++) hands.push(high + ranks[j] + 's');
            }
            for (let i = 0; i < o.length; i++) {
                let high = ranks[i], thresholdIdx = ranks.indexOf(o[i]);
                for (let j = i + 1; j <= thresholdIdx; j++) hands.push(high + ranks[j] + 'o');
            }
            if (p) {
                let thresholdIdx = ranks.indexOf(p[0]);
                for (let i = 0; i <= thresholdIdx; i++) hands.push(ranks[i] + ranks[i]);
            }
            return hands;
        }

        const ranges = {
            'UTG': { raise: parseThreshold('279T9', 'TJ', '66'), call: [] },
            'HJ': { raise: parseThreshold('259988', '9TJ', '55'), call: [] },
            'CO': { raise: parseThreshold('24687776', '8TTT', '44'), call: [] },
            'BTN': { raise: parseThreshold('2235666544', '48999', '22'), call: [] },
            'SB': { raise: parseThreshold('2224665544', '38999', '22'), call: [] },
            // BB 防守維持 Call/Fold
            'BB_UTG': { raise: [], call: parseThreshold('223665443222', '9TTT', '22') },
            'BB_HJ': { raise: [], call: parseThreshold('222365443222', '8TTT', '22') },
            'BB_CO': { raise: [], call: parseThreshold('222245433222', '4999', '22') },
            'BB_BTN': { raise: [], call: parseThreshold('222222432222', '258888', '22') },
            'BB_SB': { raise: [], call: parseThreshold('22225654322', '39999', '22') }
        };

        function initUI() {
            const rfiRow = document.createElement('div'); rfiRow.className = 'controls-row'; rfiRow.innerHTML = '<b>Open: </b>';
            rfiPos.forEach(p => {
                document.getElementById('check-group-rfi').innerHTML += `<label class="checkbox-item"><input type="checkbox" class="pos-check" value="${p}" checked>${p}</label>`;
                rfiRow.innerHTML += `<button class="range-btn" id="btn-${p}" onclick="changeReferenceRange('${p}')">${p}</button>`;
            });
            const bbRow = document.createElement('div'); bbRow.className = 'controls-row'; bbRow.innerHTML = '<b>BB Defense: </b>';
            bbPos.forEach(p => {
                const label = p.split('_')[1];
                document.getElementById('check-group-bb').innerHTML += `<label class="checkbox-item"><input type="checkbox" class="pos-check" value="${p}" checked>${label}</label>`;
                bbRow.innerHTML += `<button class="range-btn" id="btn-${p}" onclick="changeReferenceRange('${p}')">vs ${label}</button>`;
            });
            document.getElementById('range-controls').append(rfiRow, bbRow);
        }

        let score = 0, total = 0, quizPos = 'UTG', quizHand = '', isWaiting = false;

        function generateNewQuestion() {
            isWaiting = false; document.getElementById('feedback-msg').innerText = '';
            const checked = Array.from(document.querySelectorAll('.pos-check:checked')).map(cb => cb.value);
            if (!checked.length) { alert("請選位置！"); toggleAllChecks(true); return; }
            quizPos = checked[Math.floor(Math.random() * checked.length)];
            document.getElementById('table-title').innerText = quizPos.replace('_', ' vs ');
            updateTableDisplay(quizPos);
            let i = Math.floor(Math.random() * 13), j = Math.floor(Math.random() * 13);
            quizHand = i < j ? ranks[i]+ranks[j]+'s' : (i > j ? ranks[j]+ranks[i]+'o' : ranks[i]+ranks[j]);
            document.getElementById('table-hand-display').innerText = quizHand;
        }

        function checkAnswer(ans) {
            if (isWaiting) return; isWaiting = true;
            let range = ranges[quizPos], correct = 'Fold';
            if (range.raise.includes(quizHand)) correct = 'Raise';
            else if (range.call.includes(quizHand)) correct = 'Call';
            total++;
            if (ans === correct) {
                score++; document.getElementById('feedback-msg').innerText = "✅"; document.getElementById('feedback-msg').style.color = "green";
                setTimeout(generateNewQuestion, 600);
            } else {
                changeReferenceRange(quizPos); document.getElementById('feedback-msg').innerText = "❌ 正確: " + correct; document.getElementById('feedback-msg').style.color = "red";
                setTimeout(generateNewQuestion, 1800);
            }
            document.getElementById('score-display').innerText = score; document.getElementById('total-display').innerText = total;
            document.getElementById('accuracy-display').innerText = Math.round((score/total)*100);
        }

        function updateTableDisplay(pos) {
            document.querySelectorAll('.seat').forEach(s => s.classList.remove('hero', 'villain'));
            if (pos.includes('_')) {
                const [hero, villain] = pos.split('_');
                const hSeat = document.getElementById('seat-' + hero); if(hSeat) hSeat.classList.add('hero');
                const vSeat = document.getElementById('seat-' + villain); if(vSeat) vSeat.classList.add('villain');
            } else { const hSeat = document.getElementById('seat-' + pos); if(hSeat) hSeat.classList.add('hero'); }
        }

        function changeReferenceRange(pos) {
            const grid = document.getElementById('poker-grid'); grid.innerHTML = '';
            document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
            const b = document.getElementById('btn-' + pos); if(b) b.classList.add('active');
            let rCom = 0, cCom = 0;
            ranks.forEach((r1, i) => ranks.forEach((r2, j) => {
                let h = i < j ? r1+r2+'s' : (i > j ? r2+r1+'o' : r1+r2);
                let cell = document.createElement('div'); cell.className = 'cell'; cell.innerText = h;
                let w = (i === j) ? 6 : (i < j ? 4 : 12);
                if (ranges[pos].raise.includes(h)) { cell.classList.add('raise'); rCom += w; }
                else if (ranges[pos].call.includes(h)) { cell.classList.add('call'); cCom += w; }
                grid.appendChild(cell);
            }));
            const rPct = ((rCom/1326)*100).toFixed(1); const cPct = ((cCom/1326)*100).toFixed(1);
            document.getElementById('stat-raise').innerText = rPct + '%';
            document.getElementById('stat-call').innerText = cPct + '%';
            document.getElementById('stat-fold').innerText = (100 - parseFloat(rPct) - parseFloat(cPct)).toFixed(1) + '%';
        }

        function toggleAllChecks(s) { document.querySelectorAll('.pos-check').forEach(c => c.checked = s); }
        function resetScore() { score = 0; total = 0; document.getElementById('score-display').innerText = 0; document.getElementById('total-display').innerText = 0; document.getElementById('accuracy-display').innerText = 0; }

        initUI(); changeReferenceRange('UTG'); generateNewQuestion();
    </script>
</body>
</html>
